<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Util rate calculator</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page__header">
        <h1 class="page__title">Util rate calculator</h1>
        <p class="page__lead">
          Enter each month’s utilization (0–100%). The score is the annual average; empty months count as 0%.
          Values are saved in this browser only (local storage).
        </p>
      </header>
      <section class="panel" id="app" aria-label="Utilization tool">
        <div class="score" aria-live="polite" aria-atomic="true">
          <p class="score__value" id="scoreDisplay">0.0%</p>
          <p class="score__label">Annual average</p>
        </div>
        <div
          class="months"
          role="group"
          aria-label="Monthly utilization, percent"
        >
          <div class="month-col">
            <label class="month-col__label" for="util-01">Jan</label>
            <input
              class="month-col__input"
              type="number"
              id="util-01"
              data-month="1"
              min="0"
              max="100"
              step="0.1"
              inputmode="decimal"
              placeholder="0"
            />
          </div>
          <div class="month-col">
            <label class="month-col__label" for="util-02">Feb</label>
            <input
              class="month-col__input"
              type="number"
              id="util-02"
              data-month="2"
              min="0"
              max="100"
              step="0.1"
              inputmode="decimal"
              placeholder="0"
            />
          </div>
          <div class="month-col">
            <label class="month-col__label" for="util-03">Mar</label>
            <input
              class="month-col__input"
              type="number"
              id="util-03"
              data-month="3"
              min="0"
              max="100"
              step="0.1"
              inputmode="decimal"
              placeholder="0"
            />
          </div>
          <div class="month-col">
            <label class="month-col__label" for="util-04">Apr</label>
            <input
              class="month-col__input"
              type="number"
              id="util-04"
              data-month="4"
              min="0"
              max="100"
              step="0.1"
              inputmode="decimal"
              placeholder="0"
            />
          </div>
          <div class="month-col">
            <label class="month-col__label" for="util-05">May</label>
            <input
              class="month-col__input"
              type="number"
              id="util-05"
              data-month="5"
              min="0"
              max="100"
              step="0.1"
              inputmode="decimal"
              placeholder="0"
            />
          </div>
          <div class="month-col">
            <label class="month-col__label" for="util-06">Jun</label>
            <input
              class="month-col__input"
              type="number"
              id="util-06"
              data-month="6"
              min="0"
              max="100"
              step="0.1"
              inputmode="decimal"
              placeholder="0"
            />
          </div>
          <div class="month-col">
            <label class="month-col__label" for="util-07">Jul</label>
            <input
              class="month-col__input"
              type="number"
              id="util-07"
              data-month="7"
              min="0"
              max="100"
              step="0.1"
              inputmode="decimal"
              placeholder="0"
            />
          </div>
          <div class="month-col">
            <label class="month-col__label" for="util-08">Aug</label>
            <input
              class="month-col__input"
              type="number"
              id="util-08"
              data-month="8"
              min="0"
              max="100"
              step="0.1"
              inputmode="decimal"
              placeholder="0"
            />
          </div>
          <div class="month-col">
            <label class="month-col__label" for="util-09">Sep</label>
            <input
              class="month-col__input"
              type="number"
              id="util-09"
              data-month="9"
              min="0"
              max="100"
              step="0.1"
              inputmode="decimal"
              placeholder="0"
            />
          </div>
          <div class="month-col">
            <label class="month-col__label" for="util-10">Oct</label>
            <input
              class="month-col__input"
              type="number"
              id="util-10"
              data-month="10"
              min="0"
              max="100"
              step="0.1"
              inputmode="decimal"
              placeholder="0"
            />
          </div>
          <div class="month-col">
            <label class="month-col__label" for="util-11">Nov</label>
            <input
              class="month-col__input"
              type="number"
              id="util-11"
              data-month="11"
              min="0"
              max="100"
              step="0.1"
              inputmode="decimal"
              placeholder="0"
            />
          </div>
          <div class="month-col">
            <label class="month-col__label" for="util-12">Dec</label>
            <input
              class="month-col__input"
              type="number"
              id="util-12"
              data-month="12"
              min="0"
              max="100"
              step="0.1"
              inputmode="decimal"
              placeholder="0"
            />
          </div>
        </div>
      </section>
    </main>
    <script src="js/main.js" defer></script>
  </body>
</html>
